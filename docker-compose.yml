services:
  db:
    image: postgres:16-alpine
    container_name: ${DB_CONTAINER_NAME:?Set DB_CONTAINER_NAME in .env}
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      PRIMARY_USER_PIN: ${PRIMARY_USER_PIN:?Set PRIMARY_USER_PIN in .env}
      SECONDARY_USER_PIN: ${SECONDARY_USER_PIN:?Set SECONDARY_USER_PIN in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 3s
      retries: 5

  portal:
    image: ${PORTAL_IMAGE:?Set PORTAL_IMAGE in .env}
    container_name: ${PORTAL_CONTAINER_NAME:?Set PORTAL_CONTAINER_NAME in .env}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://portal:${DB_PASSWORD:?Set DB_PASSWORD in .env}@db:5432/portal
      IRON_SESSION_SECRET: ${IRON_SESSION_SECRET:?Set IRON_SESSION_SECRET in .env}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET in .env}
    ports:
      - "3000:3000"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: ${MEDIAMTX_CONTAINER_NAME:?Set MEDIAMTX_CONTAINER_NAME in .env}
    restart: unless-stopped
    environment:
      MTX_AUTHINTERNALUSERS: '[{"user":"publisher","pass":"${MEDIAMTX_PUBLISH_SECRET:?Set MEDIAMTX_PUBLISH_SECRET in .env}","permissions":[{"action":"publish"}]},{"user":"any","permissions":[{"action":"read"}]}]'
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ${TUNNEL_CONTAINER_NAME:?Set TUNNEL_CONTAINER_NAME in .env}
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TOKEN:?Set CLOUDFLARE_TOKEN in .env}
    depends_on:
      - portal

volumes:
  pgdata:
