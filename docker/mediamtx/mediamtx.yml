# MediaMTX configuration for the household portal Phase 1 streaming pipeline.
# See https://github.com/bluenviron/mediamtx for full options.

logLevel: info

# RTSP server (LAN-only, port mapped to host so ffmpeg on Windows can publish).
rtspAddress: :8554
rtspTransports: [tcp]

# HLS server (Docker-network-internal, NOT mapped to host).
# Only the portal container reaches this via Docker DNS at http://mediamtx:8888.
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsAllowOrigins: ['*']

# Authentication.
# authInternalUsers is provided via the MTX_AUTHINTERNALUSERS env var in
# docker-compose.yml. MediaMTX does not reliably substitute ${VAR} inside the
# auth section of this YAML file, so passing the resolved JSON via env var
# sidesteps the issue while keeping the secret out of this committed file.
authMethod: internal

# Accept any stream name. The proxy validates names with a regex on the way in.
paths:
  all_others:
